name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            installer_type: deb
          - os: windows-latest
            platform: windows
            installer_type: msi
          - os: macos-latest
            platform: macos
            installer_type: dmg
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Install WiX Toolset
        if: runner.os == 'Windows'
        run: |
          choco install wixtoolset -y --no-progress
          $wixDir = (Get-ChildItem "${env:ProgramFiles(x86)}" -Directory | Where-Object { $_.Name -like 'WiX Toolset*' } | Select-Object -First 1).FullName
          "$wixDir\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build and test
        working-directory: application
        run: mvn -B clean package

      - name: Copy dependencies
        working-directory: application
        run: mvn -B dependency:copy-dependencies -DoutputDirectory=target/deps

      - name: Create installer
        working-directory: application
        shell: bash
        run: |
          mkdir -p target/mods target/installer
          cp target/jkaraoke-*.jar target/mods/
          cp target/deps/*.jar target/mods/
          jpackage \
            --type ${{ matrix.installer_type }} \
            --name jKaraoke \
            --module-path target/mods \
            --module application/karaoke.Main \
            --java-options "--enable-native-access=javafx.graphics" \
            --java-options "--enable-native-access=javafx.media" \
            --dest target/installer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jkaraoke-${{ matrix.platform }}
          path: application/target/installer/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            jkaraoke-linux/*
            jkaraoke-windows/*
            jkaraoke-macos/*
          generate_release_notes: true
